<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Ateliê Acadêmico</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container" style="max-width: 400px; margin: 100px auto; padding: 30px;">
        <h1 style="text-align: center;"><i class="fas fa-graduation-cap"></i> Login</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Ateliê Acadêmico</p>
        
        <div class="painel-entrada" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="email-login" placeholder="E-mail (ex: aluno@udesc.br)" style="width: 100%; padding: 12px;">
            <input type="password" id="senha-login" placeholder="Sua senha" style="width: 100%; padding: 12px;">
            <button onclick="realizarLogin()" style="width: 100%; padding: 12px; cursor: pointer;">
                <i class="fas fa-sign-in-alt"></i> Entrar no Ateliê
            </button>
        </div>
    </div>

    <script>
        function realizarLogin() {
            const email = document.getElementById('email-login').value;
            const senha = document.getElementById('senha-login').value;

            // MOCK: Simulação de autenticação
            if (email !== "" && senha !== "") {
                localStorage.setItem('usuarioLogado', email);
                window.location.href = "dashboard.html"; // Vai para a tela principal
            } else {
                alert("Por favor, insira um e-mail e senha para acessar.");
            }
        }
    </script>
</body>
</html>
