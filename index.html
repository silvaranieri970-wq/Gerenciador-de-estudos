<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Estudos Pro</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="main-container">
        <h1><i class="fas fa-graduation-cap"></i> Ateliê Acadêmico</h1>
        <div class="topo-usuario">
    <span>Olá, Estudante!</span>
    <a href="#" class="btn-sair" onclick="alert('Saindo do Ateliê Acadêmico...')">Sair</a>
</div>

        <div class="painel-entrada">
            <input type="text" id="materia" placeholder="Matéria">
            <input type="text" id="assunto" placeholder="Assunto">
            <select id="categoria">
                <option value="Geral">Geral</option>
                <option value="Exatas">Exatas</option>
                <option value="Programação">Programação</option>
                <option value="Humanas">Humanas</option>
            </select>
            <button id="btn-adicionar"><i class="fas fa-plus-circle"></i> Adicionar</button>
        </div>

        <div class="busca-container">
            <input type="text" id="campo-busca" placeholder="Pesquisar nas minhas listas...">

<button id="btn-buscar">
    <i class="fas fa-search"></i> Buscar
</button>
            
        </div>

        <div class="banner-estudos">
            <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c?q=80&w=1600" alt="Banner Estudos">
        </div>

        <div class="colunas-listas">
            <div class="coluna">
                <h3><i class="fas fa-tasks"></i></i> Plano de Estudos (<span id="count-pendentes">0</span>)</h3>
                <ul id="lista-pendentes"></ul>
            </div>

            <div class="coluna">
                <h3><i class="fas fa-check-double"></i> Já Estudado (<span id="count-concluidas">0</span>)</h3>
                <ul id="lista-concluidas"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
