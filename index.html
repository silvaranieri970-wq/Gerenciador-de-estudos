<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ateliê Acadêmico - Login</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="main-container" style="max-width: 400px; margin-top: 100px;">
        <h1>Login</h1>
        <div class="painel-entrada">
            <input type="email" id="email-login" placeholder="Seu e-mail da UDESC">
            <button onclick="realizarLogin()">Entrar</button>
        </div>
    </div>
    <script>
        function realizarLogin() {
            const email = document.getElementById('email-login').value;
            if (email.includes('@')) {
                localStorage.setItem('usuarioLogado', email);
                window.location.href = "dashboard.html";
            } else {
                alert("Insira um e-mail válido");
            }
        }
    </script>
</body>
</html>
