<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ateliê Acadêmico - Painel</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div class="dashboard-grid">
            
            <aside class="coluna-lateral">
                <h3><i class="fas fa-link"></i> Atalhos</h3>
                <nav class="links-uteis">
                    <a href="https://www.udesc.br/siga" target="_blank">SIGA</a>
                    <a href="https://moodle.udesc.br/" target="_blank">Moodle</a>
                    <a href="https://www.udesc.br/biblioteca" target="_blank">Biblioteca</a>
                </nav>
            </aside>

            <section class="coluna-principal">
                <button onclick="sair()" class="botao-sair" style="float: right;">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
                
                <h1><i class="fas fa-graduation-cap"></i> Ateliê</h1>
                
                <div class="painel-entrada">
                    <div class="linha-input">
                        <select id="input-fase" onchange="atualizarMaterias()">
                            <option value="">Fase</option>
                            <option value="1">1ª Fase</option>
                            <option value="2">2ª Fase</option>
                            <option value="3">3ª Fase</option>
                            <option value="4">4ª Fase</option>
                        </select>
                        <select id="input-materia" onchange="atualizarSugestoes()">
                            <option value="">Matéria</option>
                        </select>
                    </div>
                    <div class="linha-input">
                        <input type="text" id="input-assunto" list="sugestoes-lista" placeholder="Assunto (ex: Tabela Verdade)">
                        <datalist id="sugestoes-lista"></datalist>
                        <button onclick="adicionarTarefa()"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="listas-container">
                    <div class="coluna">
                        <h3><i class="fas fa-tasks"></i> Pendentes</h3>
                        <ul id="lista-pendentes"></ul>
                    </div>
                </div>
            </section>

            <aside class="coluna-lateral">
                <h3><i class="fas fa-clock"></i> Agora</h3>
                <div id="relogio" style="font-size: 1.1em; font-weight: bold; color: #27ae60;">00:00:00</div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <p style="font-size: 0.8em; color: #999;">
                    Tarefas: <strong id="numero-tarefas" style="color: #27ae60;">0</strong>
                </p>
            </aside>

        </div> </div> <script src="app.js"></script>
</body>
</html>
