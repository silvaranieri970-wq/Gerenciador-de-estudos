<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Estudos Pro</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <h1><i class="fas fa-graduation-cap"></i> Ateliê Acadêmico</h1>
        
        <div class="topo-usuario">
            <span>Olá, Estudante!</span>
            <a href="#" class="btn-sair" onclick="alert('Saindo...')">Sair</a>
        </div>

        <div class="painel-entrada">
            <div class="linha-input">
                <label>Fase:</label>
                <select id="input-fase" onchange="atualizarOpcoesMaterias()">
                    <option value="">Escolha a Fase</option>
                    <option value="1">1ª Fase</option>
                    <option value="2">2ª Fase</option>
                    <option value="3">3ª Fase</option>
                    <option value="4">4ª Fase</option>
                </select>

                <label>Matéria:</label>
                <select id="input-materia">
                    <option value="">Selecione a fase primeiro</option>
                </select>
            </div>

            <div class="linha-input">
                <input type="text" id="input-assunto" placeholder="Assunto (ex: Estudar para prova)">
                <select id="input-categoria">
                    <option value="Geral">Geral</option>
                    <option value="Exatas">Exatas</option>
                    <option value="Programação">Programação</option>
                    <option value="Humanas">Humanas</option>
                </select>
                <button id="btn-adicionar"><i class="fas fa-plus-circle"></i> Adicionar</button>
            </div>
        </div>
<select id="filtro-fase" onchange="filtrarPorFase()">
        <div class="busca-container">
            <input type="text" id="input-assunto" list="sugestoes-assunto" placeholder="Ex: Estudar para prova">
<datalist id="sugestoes-assunto"></datalist>
           
            
            <select id="filtro-fase-tela" onchange="filtrarPorFase()">
                <option value="todas">Todas as Fases</option>
                <option value="1">1ª Fase</option>
                <option value="2">2ª Fase</option>
                <option value="3">3ª Fase</option>
                <option value="4">4ª Fase</option>
            </select>
        </div>

        <div class="banner-estudos">
            <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c?q=80&w=1600" alt="Banner Estudos">
        </div>

        <div class="colunas-listas">
            <div class="coluna">
                <h3><i class="fas fa-tasks"></i> Plano de Estudos (<span id="count-pendentes">0</span>)</h3>
                <ul id="lista-pendentes"></ul>
            </div>

            <div class="coluna">
                <h3><i class="fas fa-check-double"></i> Já Estudado (<span id="count-concluidas">0</span>)</h3>
                <ul id="lista-concluidas"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script> 
</body>
</html>
