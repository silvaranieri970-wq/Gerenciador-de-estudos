<div class="painel-entrada">
            <div class="linha-input">
                <label>Fase:</label>
                <select id="input-fase" onchange="atualizarOpcoesMaterias()">
                    <option value="">Escolha a Fase</option>
                    <option value="1">1ª Fase</option>
                    <option value="2">2ª Fase</option>
                    <option value="3">3ª Fase</option>
                    <option value="4">4ª Fase</option>
                </select>

                <label>Matéria:</label>
                <select id="input-materia">
                    <option value="">Selecione a fase primeiro</option>
                </select>
            </div>

            <div class="linha-input">
                <input type="text" id="input-assunto" list="sugestoes-assunto" placeholder="Assunto (ex: Estudar para prova)">
                <datalist id="sugestoes-assunto"></datalist>

                <select id="input-categoria">
                    <option value="Geral">Geral</option>
                    <option value="Exatas">Exatas</option>
                    <option value="Programação">Programação</option>
                    <option value="Humanas">Humanas</option>
                </select>
                <button id="btn-adicionar"><i class="fas fa-plus-circle"></i> Adicionar</button>
            </div>
        </div>

        <div class="busca-container">
            <input type="text" id="campo-busca" placeholder="Pesquisar nas minhas listas...">
            
            <select id="filtro-fase-tela" onchange="filtrarPorFase()">
                <option value="todas">Todas as Fases</option>
                <option value="1">1ª Fase</option>
                <option value="2">2ª Fase</option>
                <option value="3">3ª Fase</option>
                <option value="4">4ª Fase</option>
            </select>
        </div>
